name: CLS Daily Report

on:
  push:
    branches: [main]
  schedule:
    # Monday-Friday at 00:45 UTC = 08:45 Beijing time
    - cron: '45 0 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests akshare

      - name: Generate daily report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cd cls_tool
          python main.py
          # Copy generated files to reports/
          for f in outputs/CLS_早报_*.md; do cp "$f" ../reports/ 2>/dev/null; done
          for f in outputs/CLS_早报_*.html; do cp "$f" ../reports/ 2>/dev/null; done
          # Update reports.js with the new date
          DATE_STR=$(date +%Y%m%d)
          DATE_LABEL=$(date +%Y年%m月%d日)
          python -c "
import json, os
js_path = '../reports.js'
with open(js_path, 'r', encoding='utf-8') as f:
    content = f.read()
# Extract existing list
start = content.index('[')
end = content.rindex(']') + 1
arr = json.loads(content[start:end])
# Prepend new date if not already first
entry = {'date': '$DATE_STR', 'label': '$DATE_LABEL', 'file': 'reports/CLS_早报_$DATE_STR.html'}
if not arr or arr[0].get('date') != '$DATE_STR':
    arr.insert(0, entry)
    new_json = json.dumps(arr, ensure_ascii=False, indent=2)
    new_content = content[:start] + new_json + content[end:]
    with open(js_path, 'w', encoding='utf-8') as f:
        f.write(new_content)
    print(f'Updated reports.js with date $DATE_STR')
else:
    print(f'Date $DATE_STR already in reports.js')
"

      - name: Commit and push reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "Daily report $(date +%Y-%m-%d)"
          git push
