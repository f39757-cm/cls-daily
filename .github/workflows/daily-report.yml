name: CLS Daily Report

on:
  push:
    branches: [main]
  schedule:
    # Monday-Friday at 00:45 UTC = 08:45 Beijing time
    - cron: '45 0 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests akshare

      - name: Generate daily report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cd cls_tool
          python main.py
          cp outputs/CLS_早报_*.md ../reports/ 2>/dev/null || true
          cp outputs/CLS_早报_*.html ../reports/ 2>/dev/null || true

      - name: Commit and push reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "Daily report $(date +%Y-%m-%d)"
          git push
